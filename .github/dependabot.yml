version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "HAYASAKA7"
    assignees:
      - "HAYASAKA7"
    labels:
      - "dependencies"
      - "go"

  # npm package metadata
  - package-ecosystem: "npm"
    directory: "/npm"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "HAYASAKA7"
    assignees:
      - "HAYASAKA7"
    labels:
      - "dependencies"
      - "npm"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "HAYASAKA7"
    assignees:
      - "HAYASAKA7"
    labels:
      - "dependencies"
      - "github-actions"